name: SE333_CI
on:
  push:
    branches:
      - main

jobs:
  SE333_CI_JOB:
    runs-on: ubuntu-latest
    steps:
      - name: checkout-repo
        uses: actions/checkout@v4

      - name: setupJava
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          architecture: x64

      - name: Install Playwright Browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Install Linter
        run: mvn validate --no-transfer-progress

      - name: Run Checkstyle
        run: mvn checkstyle:checkstyle --no-transfer-progress

      - name: Upload Checkstyle Result
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle.xml
          path: target/checkstyle-result.xml
          if-no-files-found: warn

      - name: Run CodegenBookstoreTest
        run: mvn exec:java -Dexec.mainClass=playwrightTraditional.CodegenBookstoreTest -Dexec.classpathScope=test --no-transfer-progress

      - name: Jacoco Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco.xml
          path: target/site/jacoco/jacoco.xml
          if-no-files-found: warn

      - name: Upload Playwright Videos
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: videos/
          if-no-files-found: warn